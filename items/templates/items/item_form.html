{% load static %}
<link rel="stylesheet" href="{% static 'items/style.css' %}" />
<div class="container">
  <h1>{% if form.instance.pk %}Edit Item{% else %}Create Item{% endif %}</h1>
  <form method="post">
    {% csrf_token %} {{ form.as_p }}
    <button type="submit">Save</button>
  </form>
  <a href="{% url 'item_list' %}">Back to List</a>
</div>
